name: Build Iosevka

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build font
        run: |
          npm run build -- contents::IosevkaCustom

      - name: Archive build
        run: |
          mkdir dist
          cp -r dist/* dist_out/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosevka-font
          path: dist
